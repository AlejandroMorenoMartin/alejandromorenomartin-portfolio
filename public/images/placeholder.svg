<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(228,167,17,0.06)" stroke-width="1"/>
    </pattern>
    <pattern id="scan" width="1" height="3" patternUnits="userSpaceOnUse">
      <rect y="0" width="1" height="1" fill="rgba(0,0,0,0.15)"/>
    </pattern>
    <radialGradient id="sun-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="rgba(228,167,17,0.30)"/>
      <stop offset="60%"  stop-color="rgba(228,167,17,0.10)"/>
      <stop offset="100%" stop-color="rgba(228,167,17,0)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" fill="#100D07"/>
  <rect width="800" height="480" fill="url(#grid)"/>

  <!-- Sun glow halo -->
  <circle cx="218" cy="168" r="64" fill="url(#sun-glow)"/>
  <!-- Sun -->
  <circle cx="218" cy="168" r="28" fill="#1A1610" stroke="rgba(228,167,17,0.5)" stroke-width="1.5"/>
  <circle cx="218" cy="168" r="22" fill="rgba(228,167,17,0.18)"/>

  <!-- Back mountain — smooth curve -->
  <path d="M 0 480 L 0 310 C 80 310 140 200 260 195 C 380 190 460 280 560 260 C 660 240 720 210 800 220 L 800 480 Z" fill="#161209"/>

  <!-- Front mountain — smooth curve -->
  <path d="M 0 480 L 0 400 C 100 400 180 320 300 300 C 400 283 480 360 600 340 C 700 323 750 360 800 355 L 800 480 Z" fill="#1E1810"/>

  <!-- Scanlines -->
  <rect width="800" height="480" fill="url(#scan)"/>
</svg>
