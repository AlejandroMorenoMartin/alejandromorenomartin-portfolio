<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" shape-rendering="crispEdges">
  <!-- Pixel art A — gold on transparent, reconstructed from 48×48 PNG -->
  <!-- Each rect = 3×3px block, ~5px padding, letter spans ~38px -->

  <!-- Peak row -->
  <rect x="18" y="5"  width="12" height="3" fill="#E4A711"/>

  <!-- Upper diagonals -->
  <rect x="15" y="8"  width="6"  height="3" fill="#E4A711"/>
  <rect x="27" y="8"  width="6"  height="3" fill="#E4A711"/>

  <rect x="12" y="11" width="6"  height="3" fill="#E4A711"/>
  <rect x="30" y="11" width="6"  height="3" fill="#E4A711"/>

  <rect x="9"  y="14" width="6"  height="3" fill="#E4A711"/>
  <rect x="33" y="14" width="6"  height="3" fill="#E4A711"/>

  <!-- Crossbar -->
  <rect x="9"  y="17" width="30" height="3" fill="#E4A711"/>

  <!-- Lower diagonals -->
  <rect x="6"  y="20" width="6"  height="3" fill="#E4A711"/>
  <rect x="36" y="20" width="6"  height="3" fill="#E4A711"/>

  <rect x="6"  y="23" width="6"  height="3" fill="#E4A711"/>
  <rect x="36" y="23" width="6"  height="3" fill="#E4A711"/>

  <rect x="3"  y="26" width="6"  height="3" fill="#E4A711"/>
  <rect x="39" y="26" width="6"  height="3" fill="#E4A711"/>

  <rect x="3"  y="29" width="6"  height="3" fill="#E4A711"/>
  <rect x="39" y="29" width="6"  height="3" fill="#E4A711"/>

  <!-- Feet -->
  <rect x="3"  y="32" width="9"  height="3" fill="#E4A711"/>
  <rect x="36" y="32" width="9"  height="3" fill="#E4A711"/>

  <rect x="3"  y="35" width="9"  height="3" fill="#E4A711"/>
  <rect x="36" y="35" width="9"  height="3" fill="#E4A711"/>
</svg>
